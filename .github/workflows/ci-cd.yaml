name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            tusharchoudhary2002/ml-platform-backend:latest
            tusharchoudhary2002/ml-platform-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            tusharchoudhary2002/ml-platform-frontend:latest
            tusharchoudhary2002/ml-platform-frontend:${{ github.sha }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Success Message
        if: ${{ needs.build-and-push.result == 'success' }}
        run: |
          echo "✅ Build successful!"
          echo "Backend: tusharchoudhary2002/ml-platform-backend:${{ github.sha }}"
          echo "Frontend: tusharchoudhary2002/ml-platform-frontend:${{ github.sha }}"

      - name: Failure Message
        if: ${{ needs.build-and-push.result == 'failure' }}
        run: |
          echo "❌ Build failed! Check logs above."
          exit 1
